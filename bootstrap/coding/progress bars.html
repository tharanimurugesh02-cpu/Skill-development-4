<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Progress Bars</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="bg-light p-5">

  <div class="container">

    <h2 class="text-center text-primary mb-5">
      Bootstrap Progress Bars
    </h2>

    <!-- Progress Bar Height -->
    <h4>1. Progress Bar Height</h4>

    <div class="progress mb-4" style="height: 30px;">
      <div class="progress-bar" style="width: 70%;">
        70%
      </div>
    </div>

    <!-- Progress Bar Labels -->
    <h4>2. Progress Bar Labels</h4>

    <div class="progress mb-4">
      <div class="progress-bar bg-success" style="width: 60%;">
        Loading 60%
      </div>
    </div>

    <!-- Colored Progress Bars -->
    <h4>3. Colored Progress Bars</h4>

    <div class="progress mb-3">
      <div class="progress-bar bg-primary" style="width: 25%;">
        25%
      </div>
    </div>

    <div class="progress mb-3">
      <div class="progress-bar bg-success" style="width: 50%;">
        50%
      </div>
    </div>

    <div class="progress mb-3">
      <div class="progress-bar bg-warning" style="width: 75%;">
        75%
      </div>
    </div>

    <div class="progress mb-4">
      <div class="progress-bar bg-danger" style="width: 100%;">
        100%
      </div>
    </div>

    <!-- Striped Progress Bar -->
    <h4>4. Striped Progress Bar</h4>

    <div class="progress mb-4">
      <div class="progress-bar progress-bar-striped bg-info"
           style="width: 80%;">
        80%
      </div>
    </div>

    <!-- Animated Progress Bar -->
    <h4>5. Animated Progress Bar</h4>

    <div class="progress mb-4">
      <div class="progress-bar progress-bar-striped 
                  progress-bar-animated bg-dark"
           style="width: 90%;">
        90%
      </div>
    </div>

    <!-- Multiple Progress Bars -->
    <h4>6. Multiple Progress Bars</h4>

    <div class="progress">

      <div class="progress-bar bg-success"
           style="width: 30%;">
        HTML
      </div>

      <div class="progress-bar bg-primary"
           style="width: 40%;">
        CSS
      </div>

      <div class="progress-bar bg-danger"
           style="width: 30%;">
        Bootstrap
      </div>

    </div>

  </div>
    
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</html>
