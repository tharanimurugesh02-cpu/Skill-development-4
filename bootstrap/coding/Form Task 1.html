<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
     <body class="bg-light">

  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-6 bg-white p-4 rounded shadow-sm">
        <h3 class="mb-4 text-center text-primary">Registration Form</h3>
        
        <form>
          
          <div class="mb-3">
            <label for="fullName" class="form-label">Full Name</label>
            <input type="text" class="form-control" id="fullName" placeholder="Enter your name">
          </div>

          <div class="mb-3">
            <label for="country" class="form-label">Country (Normal Select)</label>
            <select class="form-select" id="country">
              <option selected>Choose your country...</option>
              <option value="1">India</option>
              <option value="2">USA</option>
              <option value="3">UK</option>
            </select>
          </div>

          <div class="mb-3">
            <label for="city" class="form-label">City (Small Select)</label>
            <select class="form-select form-select-sm" id="city">
              <option selected>Choose your city...</option>
              <option value="1">Chennai</option>
              <option value="2">Mumbai</option>
              <option value="3">Bangalore</option>
            </select>
          </div>

          <div class="mb-3">
            <label for="disabledSelect" class="form-label">Premium Benefits (Disabled)</label>
            <select class="form-select" id="disabledSelect" disabled>
              <option selected>Not available for free users</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label d-block">Skills (Checkboxes)</label>
            <div class="form-check mb-1">
              <input class="form-check-input" type="checkbox" value="html" id="checkHTML">
              <label class="form-check-label" id="checkHTML">HTML5 / CSS3</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" value="bootstrap" id="checkBootstrap" checked>
              <label class="form-check-label" id="checkBootstrap">Bootstrap 5</label>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label d-block">Gender (Radio Buttons)</label>
            <div class="form-check mb-1">
              <input class="form-check-input" type="radio" name="gender" id="radioMale" value="male">
              <label class="form-check-label" id="radioMale">Male</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="radio" name="gender" id="radioFemale" value="female">
              <label class="form-check-label" id="radioFemale">Female</label>
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label d-block">Preferences (Switches)</label>
            <div class="form-check form-switch mb-1">
              <input class="form-check-input" type="checkbox" id="switchNotification" checked>
              <label class="form-check-label" id="switchNotification">Enable Email Notifications</label>
            </div>
            <div class="form-check form-switch">
              <input class="form-check-input" type="checkbox" id="switchDarkMode">
              <label class="form-check-label" id="switchDarkMode">Dark Mode</label>
            </div>
          </div>

          <button type="submit" class="btn btn-primary w-100">Submit Details</button>

        </form>
        </div>
    </div>
  </div>

    
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</html>
